version: '3.8'

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: liuyao-server
    restart: always
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 5000
      SUPABASE_DB_URL: ${SUPABASE_DB_URL}
      SUPABASE_DB_SSL: ${SUPABASE_DB_SSL:-true}
      SUPABASE_DB_POOL_SIZE: ${SUPABASE_DB_POOL_SIZE:-10}
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-30d}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      DEEPSEEK_API_URL: ${DEEPSEEK_API_URL:-https://api.deepseek.com}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-v4-flash}
      TZ: Asia/Shanghai
    ports:
      - "${SERVER_PORT:-5000}:5000"
    networks:
      - liuyao-network
    volumes:
      - ./logs:/app/logs
      - /etc/localtime:/etc/localtime:ro
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:5000/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: liuyao-client
    restart: always
    ports:
      - "${CLIENT_HTTP_PORT:-80}:80"
      - "${CLIENT_HTTPS_PORT:-443}:443"
    depends_on:
      - server
    networks:
      - liuyao-network
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

networks:
  liuyao-network:
    driver: bridge
